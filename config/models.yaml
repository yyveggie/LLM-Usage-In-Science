# LLM registry for the "swap the generation LLM" experiment.
#
# Every model is accessed through an OpenAI-compatible Chat Completions API.
# Switching providers is only a matter of changing `base_url` + `model` + the
# environment variable that holds the API key. The estimation pipeline itself
# never changes: only the AI-modified distribution Q (q_t) is rebuilt per model.
#
# API keys are NEVER stored here. Each model points at an environment variable
# name via `api_key_env`; export the key in your shell before running.

# Generation parameters applied to every model unless overridden per-model.
# Defaults mirror the original paper (Appendix D of "Mapping the Increasing
# Use of LLMs in Scientific Papers"): temperature 1.0, top_p 1.0, max 2048
# tokens, no frequency/presence penalty.
defaults:
  temperature: 1.0
  top_p: 1.0
  max_tokens: 2048
  frequency_penalty: 0.0
  presence_penalty: 0.0
  request_timeout: 120
  max_retries: 5
  retry_backoff: 2.0

models:
  # Baseline aligned with the original papers (GPT-3.5). Keep this to reproduce
  # the paper's Q before comparing newer models against it.
  gpt-3.5-turbo:
    base_url: https://api.openai.com/v1
    model: gpt-3.5-turbo-0125
    api_key_env: OPENAI_API_KEY

  gpt-4o:
    base_url: https://api.openai.com/v1
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

  # Anthropic exposes an OpenAI-compatible endpoint. Penalty params are not
  # supported there, so drop them.
  claude:
    base_url: https://api.anthropic.com/v1
    model: claude-3-5-sonnet-latest
    api_key_env: ANTHROPIC_API_KEY
    drop_params: [frequency_penalty, presence_penalty]

  # Alibaba Qwen via DashScope OpenAI-compatible mode.
  qwen:
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
    api_key_env: DASHSCOPE_API_KEY

  deepseek:
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
